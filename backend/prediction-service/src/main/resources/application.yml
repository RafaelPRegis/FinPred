server:
  port: 8083

spring:
  application:
    name: prediction-service
  profiles:
    active: dev

# JWT Configuration (for token validation)
jwt:
  secret: ${JWT_SECRET:finpred-dev-secret-key-change-in-production-must-be-256-bits-long}

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.finpred.prediction: DEBUG
    org.springframework.security: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
