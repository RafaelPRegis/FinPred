# Profile: Development (H2 in-memory)
spring:
  datasource:
    url: jdbc:h2:mem:finpred_core_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    # In dev mode, RabbitMQ is optional — use a mock or skip
    listener:
      simple:
        auto-startup: false
