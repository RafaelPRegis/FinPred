# Profile: Production (MySQL)
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:finpred_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:finpred}
    password: ${MYSQL_PASSWORD:finpred_secret}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.finpred.core: INFO
    org.springframework.security: WARN
