server:
  port: 8081

spring:
  application:
    name: auth-service
  profiles:
    active: dev

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:finpred-dev-secret-key-change-in-production-must-be-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}

# Google OAuth2
google:
  client-id: ${GOOGLE_CLIENT_ID:427699906241-mmm6nsl6ggudgfdrgkbncbv00hnkgrie.apps.googleusercontent.com}

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.finpred.auth: DEBUG
    org.springframework.security: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
